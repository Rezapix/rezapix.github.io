---
const navLinks = [
  { href: '/',          label: 'خانه' },
  { href: '/portfolio', label: 'پورتفولیو' },
  { href: '/blog',      label: 'بلاگ' },
  { href: '/about',     label: 'درباره' },
  { href: '/contact',   label: 'تماس' },
];
const path = Astro.url.pathname;
---

<header class="navbar" id="navbar" dir="ltr">
  <div class="container nav-inner">

    <a href="/" class="nav-logo" aria-label="RPIX">
      <img src="/logo.png" alt="RPIX" class="logo-img" width="38" height="38" />
      <span class="logo-text font-display">RPIX</span>
    </a>

    <nav class="nav-links" aria-label="Main navigation">
      {navLinks.map(l => (
        <a href={l.href} class={`nav-link ${path === l.href ? 'active' : ''}`}>
          {l.label}
        </a>
      ))}
    </nav>

    <div class="nav-actions">
      <a href="/admin" class="btn-admin glass" title="پنل مدیریت">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <rect x="3" y="3" width="7" height="7" rx="1.5"/>
          <rect x="14" y="3" width="7" height="7" rx="1.5"/>
          <rect x="3" y="14" width="7" height="7" rx="1.5"/>
          <rect x="14" y="14" width="7" height="7" rx="1.5"/>
        </svg>
      </a>
      <button class="hamburger" id="hamburger" aria-label="منو" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>

  <div class="mobile-menu" id="mobile-menu" aria-hidden="true">
    {navLinks.map(l => (
      <a href={l.href} class="mobile-link">{l.label}</a>
    ))}
    <a href="/admin" class="mobile-link mobile-admin">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <rect x="3" y="3" width="7" height="7" rx="1.5"/>
        <rect x="14" y="3" width="7" height="7" rx="1.5"/>
        <rect x="3" y="14" width="7" height="7" rx="1.5"/>
        <rect x="14" y="14" width="7" height="7" rx="1.5"/>
      </svg>
      پنل مدیریت
    </a>
  </div>
</header>

<style>
.navbar {
  position: fixed;
  inset-block-start: 0;
  inset-inline: 0;
  z-index: var(--z-sticky);
  height: var(--nav-h);
  border-bottom: 1px solid transparent;
  transition: background var(--t-base), border-color var(--t-base), backdrop-filter var(--t-base);
}
.navbar.scrolled {
  background: rgba(4,4,4,0.88);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-bottom-color: var(--glass-border);
}
.nav-inner {
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--s8);
}
.nav-logo {
  display: flex;
  align-items: center;
  gap: var(--s3);
  flex-shrink: 0;
}
.logo-img {
  width: 40px; height: 40px;
  object-fit: contain;
  animation: pulse-red 4s ease-in-out infinite;
  transition: filter var(--t-base);
}
.nav-logo:hover .logo-img {
  filter: drop-shadow(0 0 20px rgba(204,0,0,0.8));
}
.logo-text {
  font-size: var(--xl);
  font-weight: 800;
  font-style: italic;
  color: var(--text-1);
  letter-spacing: .04em;
}
.nav-links {
  display: flex;
  align-items: center;
  gap: var(--s1);
}
.nav-link {
  padding: var(--s2) var(--s4);
  border-radius: var(--r-full);
  font-size: var(--sm);
  color: var(--text-2);
  transition: all var(--t-fast);
}
.nav-link:hover { color: var(--text-1); background: var(--glass); }
.nav-link.active { color: var(--red); background: var(--glass-red); }

.nav-actions { display: flex; align-items: center; gap: var(--s2); }

.btn-admin {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  border-radius: var(--r-md);
  color: var(--text-2);
  transition: all var(--t-fast);
}
.btn-admin:hover { color: var(--red); border-color: var(--glass-red-b); }

.hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  padding: var(--s2);
  width: 36px; height: 36px;
  justify-content: center;
  border-radius: var(--r-md);
  transition: background var(--t-fast);
}
.hamburger:hover { background: var(--glass); }
.hamburger span {
  display: block; height: 2px;
  background: var(--text-2); border-radius: 2px;
  transition: all var(--t-base); transform-origin: center;
}
.hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); background: var(--red); }
.hamburger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
.hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); background: var(--red); }

.mobile-menu {
  display: none;
  position: fixed;
  inset: var(--nav-h) 0 0 0;
  background: rgba(4,4,4,0.97);
  backdrop-filter: blur(32px);
  -webkit-backdrop-filter: blur(32px);
  padding: var(--s8) var(--s6);
  flex-direction: column;
  gap: var(--s2);
  transform: translateX(100%);
  transition: transform var(--t-base);
  z-index: var(--z-overlay);
  overflow-y: auto;
}
.mobile-menu.open { transform: translateX(0); }

.mobile-link {
  display: flex; align-items: center; gap: var(--s3);
  padding: var(--s4) var(--s5);
  border-radius: var(--r-lg);
  font-size: var(--xl);
  color: var(--text-2);
  transition: all var(--t-fast);
  border: 1px solid transparent;
  direction: rtl;
}
.mobile-link:hover {
  color: var(--text-1);
  border-color: var(--glass-border);
  background: var(--glass);
}
.mobile-admin {
  margin-top: var(--s6);
  color: var(--red);
  border-color: var(--glass-red-b);
  background: var(--glass-red);
}

@media (max-width: 768px) {
  .nav-links { display: none; }
  .hamburger { display: flex; }
  .mobile-menu { display: flex; }
}
</style>

<script>
  const navbar   = document.getElementById('navbar')!;
  const burger   = document.getElementById('hamburger')!;
  const mobileM  = document.getElementById('mobile-menu')!;

  window.addEventListener('scroll', () => {
    navbar.classList.toggle('scrolled', window.scrollY > 20);
  }, { passive: true });

  burger.addEventListener('click', () => {
    const open = burger.classList.toggle('open');
    burger.setAttribute('aria-expanded', String(open));
    mobileM.classList.toggle('open', open);
    mobileM.setAttribute('aria-hidden', String(!open));
    document.body.style.overflow = open ? 'hidden' : '';
  });

  mobileM.querySelectorAll('a').forEach(a => {
    a.addEventListener('click', () => {
      burger.classList.remove('open');
      mobileM.classList.remove('open');
      document.body.style.overflow = '';
    });
  });
</script>
